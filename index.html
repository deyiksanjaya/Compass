<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Compass">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#000000">
  <title>Compass</title>
  
  <link rel="apple-touch-icon" href="icon-512.png">
  <link rel="icon" type="image/png" href="icon-512.png">
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
      background-color: #000;
      color: #fff;
      margin: 0;
      overflow: hidden;
      touch-action: none;
    }
    #calibration-overlay {
      position: absolute; inset: 0; background-color: #000; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: opacity 0.3s;
    }
    .label-container { position: absolute; left: 50%; top: 50%; width: 0; height: 0; }
    .label-text { position: absolute; transform: translate(-50%, -50%); text-align: center; }
    .font-ios-thin { font-weight: 100; letter-spacing: -2px; }
    
    /* Settings Modal */
    #settings-modal {
      position: absolute; inset: 0; background-color: rgba(0,0,0,0.95); z-index: 999;
      display: none; flex-direction: column; align-items: center; justify-content: center;
      padding: 2rem;
    }
    .setting-row { display: flex; justify-content: space-between; width: 100%; max-width: 300px; margin-bottom: 1rem; align-items: center;}
    .setting-row input { width: 80px; background: #1c1c1e; border: 1px solid #333; color: white; padding: 4px 8px; border-radius: 6px; text-align: right;}
    
    /* Indicator Transisi Biar Smooth */
    #magic-indicator {
      transition: opacity 0.15s ease-in-out;
    }
  </style>
</head>
<body class="flex flex-col items-center justify-center h-screen w-screen relative select-none">

  <!-- Overlay Kalibrasi -->
  <div id="calibration-overlay" onclick="startAppManual()">
    <div class="text-center">
      <svg class="w-12 h-12 text-white mx-auto mb-4 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      <p class="text-lg font-medium text-gray-300 tracking-wide">Ketuk untuk mulai</p>
    </div>
  </div>

  <!-- Settings Modal Rahasia -->
  <div id="settings-modal">
    <h2 class="text-2xl font-semibold mb-6 text-white">Magic Settings</h2>
    
    <div class="setting-row">
      <label>Tilt Threshold (°)</label>
      <input type="number" id="set-threshold" value="30">
    </div>
    <div class="setting-row">
      <label>Hold Tilt (detik)</label>
      <input type="number" step="0.1" id="set-hold" value="1.5">
    </div>
    <div class="setting-row">
      <label>Delay Meja (detik)</label>
      <input type="number" step="0.1" id="set-delay" value="3.0">
    </div>
    <div class="setting-row">
      <label>Durasi Shaking (detik)</label>
      <input type="number" step="0.1" id="set-shake" value="2.5">
    </div>
    <div class="setting-row">
      <label>Animasi Muter (detik)</label>
      <input type="number" step="0.1" id="set-anim" value="3.0">
    </div>
    
    <button onclick="saveSettings()" class="mt-8 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-full">Simpan & Tutup</button>
  </div>

  <!-- UI Kompas Utama -->
  <div class="relative w-[340px] h-[340px] pointer-events-none mb-10 mt-4">
    <div class="absolute top-[0px] left-1/2 -translate-x-1/2 w-[2.5px] h-[55px] bg-white z-20"></div>

    <div id="dial" class="absolute inset-0 w-full h-full z-10 will-change-transform">
      <canvas id="ticksCanvas" width="340" height="340" class="absolute inset-0"></canvas>
      <div id="labelsContainer" class="absolute inset-0"></div>
    </div>

    <!-- Waterpas -->
    <div class="absolute inset-0 flex items-center justify-center z-0">
      <div class="absolute w-[160px] h-[1px] bg-white opacity-30"></div>
      <div class="absolute w-[1px] h-[160px] bg-white opacity-30"></div>
      
      <div id="level-bubble" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[85px] h-[85px] bg-[#1e1e1e]/90 rounded-full flex items-center justify-center shadow-inner will-change-transform">
        <div class="relative w-5 h-5">
          <div class="absolute top-1/2 left-0 w-full h-[1px] bg-white opacity-70"></div>
          <div class="absolute top-0 left-1/2 w-[1px] h-full bg-white opacity-70"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Detail Teks -->
  <div class="text-center pointer-events-none w-full px-4 mt-8">
    <!-- mb-8 untuk nurunin info di bawah kompas -->
    <h1 id="headingText" class="font-ios-thin leading-none mb-8" style="font-size: clamp(3.5rem, 16vw, 4.8rem);">0° N</h1>
    
    <div class="flex flex-col items-center justify-center space-y-1 text-[19px] font-medium tracking-wide text-white pointer-events-auto">
      <p id="coordsText">--°--'--" N --°--'--" E</p>
      <p id="cityText">Mencari lokasi...</p>
      <p id="elevationText" onclick="handleElevationTap()">Elevation N/A</p>
    </div>
  </div>

  <script>
    const labels = [
      { deg: 0, text: '0', type: 'number', outer: true }, { deg: 30, text: '30', type: 'number', outer: true },
      { deg: 60, text: '60', type: 'number', outer: true }, { deg: 90, text: '90', type: 'number', outer: true },
      { deg: 120, text: '120', type: 'number', outer: true }, { deg: 150, text: '150', type: 'number', outer: true },
      { deg: 180, text: '180', type: 'number', outer: true }, { deg: 210, text: '210', type: 'number', outer: true },
      { deg: 240, text: '240', type: 'number', outer: true }, { deg: 270, text: '270', type: 'number', outer: true },
      { deg: 300, text: '300', type: 'number', outer: true }, { deg: 330, text: '330', type: 'number', outer: true },
      { deg: 0, text: 'N', type: 'letter', outer: false }, { deg: 90, text: 'E', type: 'letter', outer: false },
      { deg: 180, text: 'S', type: 'letter', outer: false }, { deg: 270, text: 'W', type: 'letter', outer: false }
    ];

    // --- MAGIC CONFIG ---
    let mConf = {
      threshold: 30,
      holdTime: 1500,
      flatDelay: 3000,
      shakeTime: 2500,
      animTime: 3000
    };

    try {
      const saved = JSON.parse(localStorage.getItem('compassMagicSettings'));
      if(saved) mConf = {...mConf, ...saved};
    } catch(e){}

    let mState = 'IDLE'; 
    let rawBeta = 0, rawGamma = 0;
    let tiltStart = 0;
    let activeDirection = null; 
    let stateTimer = 0;
    let startAnimHeading = 0;
    let isTrueNorth = false;
    let shakeOffset = 0;
    let isBlinking = false; // Mencegah bentrok opacity saat kedip

    let tapCount = 0;
    let tapTimeout = null;

    let targetHeading = 0, currentHeading = 0;
    let targetTiltX = 0, currentTiltX = 0;
    let targetTiltY = 0, currentTiltY = 0;
    const HEADING_SMOOTHING = 0.35; 
    const TILT_SMOOTHING = 0.15;

    let isRunning = false;
    let watchId = null;
    let lastFetchedLat = null, lastFetchedLon = null;
    let hasRequestedPermission = false;
    let watchdogTimer = null;

    const dial = document.getElementById('dial');
    const labelsContainer = document.getElementById('labelsContainer');
    const headingText = document.getElementById('headingText');
    const levelBubble = document.getElementById('level-bubble');
    const coordsText = document.getElementById('coordsText');
    const cityText = document.getElementById('cityText');
    const elevationText = document.getElementById('elevationText');
    const overlay = document.getElementById('calibration-overlay');
    const settingsModal = document.getElementById('settings-modal');

    // --- SETTINGS UI ---
    function handleElevationTap() {
      tapCount++;
      clearTimeout(tapTimeout);
      tapTimeout = setTimeout(() => tapCount = 0, 1000);
      if(tapCount >= 5) {
        document.getElementById('set-threshold').value = mConf.threshold;
        document.getElementById('set-hold').value = mConf.holdTime / 1000;
        document.getElementById('set-delay').value = mConf.flatDelay / 1000;
        document.getElementById('set-shake').value = mConf.shakeTime / 1000;
        document.getElementById('set-anim').value = mConf.animTime / 1000;
        settingsModal.style.display = 'flex';
        tapCount = 0;
      }
    }

    window.saveSettings = function() {
      mConf.threshold = parseFloat(document.getElementById('set-threshold').value);
      mConf.holdTime = parseFloat(document.getElementById('set-hold').value) * 1000;
      mConf.flatDelay = parseFloat(document.getElementById('set-delay').value) * 1000;
      mConf.shakeTime = parseFloat(document.getElementById('set-shake').value) * 1000;
      mConf.animTime = parseFloat(document.getElementById('set-anim').value) * 1000;
      localStorage.setItem('compassMagicSettings', JSON.stringify(mConf));
      settingsModal.style.display = 'none';
      mState = 'IDLE'; 
    }

    // --- UI SETUP ---
    function drawTicks() {
      const canvas = document.getElementById('ticksCanvas');
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, 340, 340);
      ctx.strokeStyle = '#ffffff';
      for (let i = 0; i < 360; i += 2) {
        ctx.save();
        ctx.translate(170, 170);
        ctx.rotate(i * Math.PI / 180);
        ctx.beginPath();
        ctx.lineWidth = (i % 30 === 0) ? 2.5 : 1;
        ctx.moveTo(0, -135);
        ctx.lineTo(0, -115);
        ctx.stroke();
        ctx.restore();
      }
      ctx.save();
      ctx.translate(170, 170);
      ctx.fillStyle = '#ff453a';
      ctx.beginPath();
      ctx.moveTo(0, -145);
      ctx.lineTo(-5, -137); 
      ctx.lineTo(5, -137);  
      ctx.fill();
      ctx.restore();
    }

    function initLabels() {
      labels.forEach(label => {
        const container = document.createElement('div');
        container.className = 'label-container';
        container.style.transform = `rotate(${label.deg}deg)`;
        const textSpan = document.createElement('div');
        textSpan.className = `label-text ${label.type === 'letter' ? 'text-[32px] font-normal' : 'text-[15px] font-medium'}`;
        // Radius dijauhkan menjadi -165
        textSpan.style.marginTop = `${label.outer ? -165 : -75}px`; 
        textSpan.innerText = label.text;
        textSpan.id = `label-${label.deg}-${label.outer ? 'out' : 'in'}`;
        container.appendChild(textSpan);
        labelsContainer.appendChild(container);
      });
    }

    function getDirection(degrees) {
      const arr = ["N", "NE", "E", "SE", "S", "SW", "W", "NW"];
      return arr[Math.floor(((degrees + 22.5) % 360) / 45)];
    }

    function easeInOutCubic(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }

    // --- MAIN RENDER & MAGIC MACHINE ---
    function renderLoop() {
      if (!isRunning) return;
      const now = Date.now();

      // Indikator Magic (Simbol Derajat)
      const indicator = document.getElementById('magic-indicator');
      if (indicator && !isBlinking) {
        if (mState === 'TILTING' || mState === 'LOCKED' || mState === 'ON_TABLE') {
          indicator.style.opacity = '0';
        } else {
          indicator.style.opacity = '1';
        }
      }

      let isOverridingHeading = false;
      let isFlat = Math.abs(rawBeta) < 15 && Math.abs(rawGamma) < 15;

      if (mState === 'IDLE') {
        if (rawBeta > mConf.threshold) { activeDirection = 0; mState = 'TILTING'; tiltStart = now; }       
        else if (rawBeta < -mConf.threshold) { activeDirection = 180; mState = 'TILTING'; tiltStart = now; } 
        else if (rawGamma > mConf.threshold) { activeDirection = 270; mState = 'TILTING'; tiltStart = now; } 
        else if (rawGamma < -mConf.threshold) { activeDirection = 90; mState = 'TILTING'; tiltStart = now; } 
      } 
      else if (mState === 'TILTING') {
        let match = false;
        if (activeDirection === 0 && rawBeta > mConf.threshold) match = true;
        else if (activeDirection === 180 && rawBeta < -mConf.threshold) match = true;
        else if (activeDirection === 270 && rawGamma > mConf.threshold) match = true;
        else if (activeDirection === 90 && rawGamma < -mConf.threshold) match = true;

        if (!match) mState = 'IDLE'; 
        else if (now - tiltStart > mConf.holdTime) {
          mState = 'LOCKED';
          if(navigator.vibrate) navigator.vibrate([15, 30, 15]);
        }
      } 
      else if (mState === 'LOCKED') {
        if (isFlat) { mState = 'ON_TABLE'; stateTimer = now; }
      } 
      else if (mState === 'ON_TABLE') {
        if (!isFlat) mState = 'LOCKED'; 
        else if (now - stateTimer > mConf.flatDelay) {
          mState = 'ANIMATING';
          stateTimer = now;
          startAnimHeading = currentHeading;
          
          // Bug Fix: Murni ngecek apakah targetnya adalah Utara (0) relatif terhadap HP
          isTrueNorth = (activeDirection === 0);

          // Animasi kedip (blink) indikator derajat
          if (indicator) {
            isBlinking = true;
            indicator.style.opacity = '1'; // Muncul
            setTimeout(() => { if (indicator) indicator.style.opacity = '0'; }, 150); // Kedip hilang
            setTimeout(() => { 
              if (indicator) indicator.style.opacity = '1'; // Muncul lagi & stay
              isBlinking = false; 
            }, 300);
          }
        }
      } 
      else if (mState === 'ANIMATING') {
        isOverridingHeading = true;
        let progress = Math.min((now - stateTimer) / mConf.animTime, 1);
        let ease = easeInOutCubic(progress);

        if (isTrueNorth) {
          currentHeading = startAnimHeading + (360 * ease);
        } else {
          let diff = activeDirection - (startAnimHeading % 360);
          if (diff < -180) diff += 360;
          if (diff > 180) diff -= 360;
          currentHeading = startAnimHeading + (diff * ease);
        }

        if (progress >= 1) { mState = 'SHAKING'; stateTimer = now; }
      } 
      else if (mState === 'SHAKING') {
        isOverridingHeading = true;
        shakeOffset = Math.sin(now / 15) * 1.5; 
        currentHeading = (isTrueNorth ? (startAnimHeading + 360) : activeDirection) + shakeOffset;

        if (now - stateTimer > mConf.shakeTime) {
          if (isTrueNorth) mState = 'IDLE'; 
          else { mState = 'RETURNING'; stateTimer = now; startAnimHeading = currentHeading - shakeOffset; }
        }
      } 
      else if (mState === 'RETURNING') {
        isOverridingHeading = true;
        let progress = Math.min((now - stateTimer) / (mConf.animTime * 1.5), 1); 
        let ease = easeInOutCubic(progress);

        let diff = targetHeading - startAnimHeading;
        while (diff < -180) diff += 360;
        while (diff > 180) diff -= 360;
        
        currentHeading = startAnimHeading + (diff * ease);
        if (progress >= 1) mState = 'IDLE';
      }

      if (!isOverridingHeading) {
        let diffHeading = targetHeading - currentHeading;
        while (diffHeading < -180) diffHeading += 360;
        while (diffHeading > 180) diffHeading -= 360;
        currentHeading += diffHeading * HEADING_SMOOTHING;
      }

      currentTiltX += (targetTiltX - currentTiltX) * TILT_SMOOTHING;
      currentTiltY += (targetTiltY - currentTiltY) * TILT_SMOOTHING;

      dial.style.transform = `rotate(${-currentHeading}deg)`;
      levelBubble.style.transform = `translate(calc(-50% + ${currentTiltX}px), calc(-50% + ${currentTiltY}px))`;

      labels.forEach(label => {
        const el = document.getElementById(`label-${label.deg}-${label.outer ? 'out' : 'in'}`);
        // Bug Fix: Kembalikan rumus asli agar teks tidak ikut terbalik
        if(el) el.style.transform = `translate(-50%, -50%) rotate(${-(currentHeading + label.deg)}deg)`;
      });

      let displayHeading = Math.round((currentHeading % 360 + 360) % 360);
      headingText.innerText = `${displayHeading}° ${getDirection(displayHeading)}`;

      requestAnimationFrame(renderLoop);
    }

    // --- SENSOR LISTENER ---
    function resetWatchdog() {
      clearTimeout(watchdogTimer);
      watchdogTimer = setTimeout(() => {
        if (hasRequestedPermission && document.visibilityState === 'visible') attachOrientationListener(true);
      }, 3000);
    }

    function handleOrientation(event) {
      if (!event) return;
      resetWatchdog();

      rawBeta = event.beta || 0; 
      rawGamma = event.gamma || 0; 

      targetTiltX = Math.max(-55, Math.min(55, rawGamma * 0.6));
      targetTiltY = Math.max(-55, Math.min(55, rawBeta * 0.6));

      let heading = event.webkitCompassHeading ?? (event.alpha !== null ? 360 - event.alpha : null);
      if (heading !== null) targetHeading = heading;
    }

    function attachOrientationListener(isAutoStart = false) {
      window.removeEventListener('deviceorientation', handleOrientation);
      window.removeEventListener('deviceorientationabsolute', handleOrientation);

      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        // Bug Fix: Bypass prompt sepenuhnya kalau ini mode auto-start
        if (!isAutoStart) {
          DeviceOrientationEvent.requestPermission()
            .then(permissionState => {
              if (permissionState === 'granted') {
                localStorage.setItem('compassPermissionGranted', '1');
                window.addEventListener('deviceorientation', handleOrientation);
                hasRequestedPermission = true;
                startEngine();
              } else {
                alert("Akses sensor ditolak. Restart app ya.");
                document.getElementById('calibration-overlay').style.display = 'flex';
              }
            }).catch(() => { document.getElementById('calibration-overlay').style.display = 'flex'; });
        } else {
          window.addEventListener('deviceorientation', handleOrientation);
          startEngine();
        }
      } else {
        localStorage.setItem('compassPermissionGranted', '1');
        hasRequestedPermission = true;
        if ('ondeviceorientationabsolute' in window) window.addEventListener('deviceorientationabsolute', handleOrientation);
        else window.addEventListener('deviceorientation', handleOrientation);
        startEngine();
      }
    }

    function startEngine() {
      if (overlay) {
        overlay.style.opacity = '0';
        setTimeout(() => { if (overlay) overlay.style.display = 'none'; }, 300);
      }
      if (!isRunning) {
        isRunning = true;
        requestAnimationFrame(renderLoop);
      }
      startGPS();
      resetWatchdog();
    }

    // --- LOKASI ---
    function toDMS(coord, isLat, isFirst) {
      const absolute = Math.abs(coord);
      const degrees = Math.floor(absolute);
      const minutesNotTruncated = (absolute - degrees) * 60;
      const minutes = Math.floor(minutesNotTruncated);
      const seconds = Math.floor((minutesNotTruncated - minutes) * 60);
      const dir = isLat ? (coord >= 0 ? "N" : "S") : (coord >= 0 ? "E" : "W");
      
      // Inject span buat indikator rahasia
      const degreeSymbol = isFirst ? `<span id="magic-indicator">°</span>` : `°`;
      return `${degrees}${degreeSymbol}${minutes}'${seconds}" ${dir}`;
    }

    function getDistance(lat1, lon1, lat2, lon2) {
      const R = 6371e3; 
      const p1 = lat1 * Math.PI/180;
      const p2 = lat2 * Math.PI/180;
      const dp = (lat2-lat1) * Math.PI/180;
      const dl = (lon2-lon1) * Math.PI/180;
      const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
      return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    // Dibawa kembali dengan aman
    async function fetchAltitudeFallback(lat, lon) {
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 5000);
        const res = await fetch(`https://api.open-elevation.com/api/v1/lookup?locations=${lat},${lon}`, { signal: controller.signal });
        clearTimeout(timeoutId);
        const data = await res.json();
        if (data && data.results && data.results[0]) {
          elevationText.innerText = `${Math.round(data.results[0].elevation)} m Elevation`;
        }
      } catch (e) {}
    }

    function startGPS() {
      if (!navigator.geolocation) return;
      
      // Bug Fix: Clean up sebelum assign watchId baru
      if (watchId !== null) { 
        navigator.geolocation.clearWatch(watchId); 
        watchId = null; 
      }

      watchId = navigator.geolocation.watchPosition(
        pos => {
          const lat = pos.coords.latitude; const lon = pos.coords.longitude;
          let alt = pos.coords.altitude;
          
          coordsText.innerHTML = `${toDMS(lat, true, true)} ${toDMS(lon, false, false)}`;
          
          if (alt !== null && alt !== undefined && alt !== 0) {
            elevationText.innerText = `${Math.round(alt)} m Elevation`;
          } else if (elevationText.innerText === "Elevation N/A" || elevationText.innerText.includes("...")) {
            fetchAltitudeFallback(lat, lon);
          }
          
          if (!lastFetchedLat || getDistance(lastFetchedLat, lastFetchedLon, lat, lon) > 50) {
            lastFetchedLat = lat; lastFetchedLon = lon;
            fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`, { headers: { 'User-Agent': 'NativeCompassClone/1.0' }})
            .then(res => res.json())
            .then(data => { if (data.address) cityText.innerText = data.address.city || data.address.town || data.address.county || "Lokasi Ditemukan"; })
            .catch(() => {});
          }
        }, 
        () => {}, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    }

    function stopSensors() {
      isRunning = false;
      window.removeEventListener('deviceorientationabsolute', handleOrientation);
      window.removeEventListener('deviceorientation', handleOrientation);
      clearTimeout(watchdogTimer);
      if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
    }

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === 'visible' && hasRequestedPermission) attachOrientationListener(true);
      else stopSensors();
    });

    window.startAppManual = function() { attachOrientationListener(false); }
    if (localStorage.getItem('compassPermissionGranted')) { hasRequestedPermission = true; attachOrientationListener(true); }

    drawTicks(); initLabels();
  </script>
</body>
</html>
