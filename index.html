<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Compass">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#000000">
  <title>Compass</title>
  
  <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/1/14/Compass_icon_%28iOS%29.svg/512px-Compass_icon_%28iOS%29.svg.png">
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
      background-color: #000;
      color: #fff;
      margin: 0;
      overflow: hidden;
      touch-action: none;
    }

    #calibration-overlay {
      position: absolute;
      inset: 0;
      background-color: #000;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: opacity 0.3s;
    }

    .label-container { position: absolute; left: 50%; top: 50%; width: 0; height: 0; }
    .label-text { position: absolute; transform: translate(-50%, -50%); text-align: center; }

    #secret-grid {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      z-index: 50;
    }
    .secret-zone { width: 100%; height: 100%; }

    #level-bubble {
      transition: transform 0.05s linear;
    }

    .font-ios-thin {
      font-weight: 100;
      letter-spacing: -2px;
    }
  </style>
</head>
<body class="flex flex-col items-center justify-center h-screen w-screen relative select-none">

  <!-- Overlay Kalibrasi -->
  <div id="calibration-overlay" onclick="requestPermissions()">
    <div class="text-center">
      <svg class="w-12 h-12 text-white mx-auto mb-4 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      <p class="text-lg font-medium text-gray-300 tracking-wide">Ketuk untuk mulai</p>
    </div>
  </div>

  <!-- Area Input Magic -->
  <div id="secret-grid">
    <div class="secret-zone" onclick="setTarget(315)"></div>
    <div class="secret-zone" onclick="setTarget(0)"></div>
    <div class="secret-zone" onclick="setTarget(45)"></div>
    <div class="secret-zone" onclick="setTarget(270)"></div>
    <div class="secret-zone" onclick="triggerSpin()"></div>
    <div class="secret-zone" onclick="setTarget(90)"></div>
    <div class="secret-zone" onclick="setTarget(225)"></div>
    <div class="secret-zone" onclick="setTarget(180)"></div>
    <div class="secret-zone" onclick="setTarget(135)"></div>
  </div>

  <!-- UI Kompas Utama -->
  <div class="relative w-[340px] h-[340px] pointer-events-none mb-10 mt-4">
    
    <!-- GARIS PUTIH TENGAH -->
    <div class="absolute top-[0px] left-1/2 -translate-x-1/2 w-[2.5px] h-[55px] bg-white z-20"></div>

    <!-- Cincin Kompas -->
    <div id="dial" class="absolute inset-0 w-full h-full z-10">
      <canvas id="ticksCanvas" width="340" height="340" class="absolute inset-0"></canvas>
      <div id="labelsContainer" class="absolute inset-0"></div>
    </div>

    <!-- Waterpas -->
    <div class="absolute inset-0 flex items-center justify-center z-0">
      <div class="absolute w-[160px] h-[1px] bg-white opacity-30"></div>
      <div class="absolute w-[1px] h-[160px] bg-white opacity-30"></div>
      
      <!-- Warna background diganti ke #1e1e1e -->
      <div id="level-bubble" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[85px] h-[85px] bg-[#1e1e1e]/90 rounded-full flex items-center justify-center shadow-inner">
        <div class="relative w-5 h-5">
          <div class="absolute top-1/2 left-0 w-full h-[1px] bg-white opacity-70"></div>
          <div class="absolute top-0 left-1/2 w-[1px] h-full bg-white opacity-70"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Detail Teks -->
  <div class="text-center pointer-events-none w-full px-4 mt-8">
    <!-- Font size diperkecil sedikit lagi (clamp atasnya jadi 4.8rem) -->
    <h1 id="headingText" class="font-ios-thin leading-none mb-3" style="font-size: clamp(3.5rem, 16vw, 4.8rem);">0° N</h1>
    
    <!-- Info lokasi diperbesar (text-[19px]) -->
    <div class="flex flex-col items-center justify-center space-y-1 text-[19px] font-medium tracking-wide text-white">
      <p id="coordsText">--°--'--" N --°--'--" E</p>
      <p id="cityText">Mencari lokasi...</p>
      <p id="elevationText">Elevation N/A</p>
    </div>
  </div>

  <script>
    const labels = [
      { deg: 0, text: '0', type: 'number', outer: true }, { deg: 30, text: '30', type: 'number', outer: true },
      { deg: 60, text: '60', type: 'number', outer: true }, { deg: 90, text: '90', type: 'number', outer: true },
      { deg: 120, text: '120', type: 'number', outer: true }, { deg: 150, text: '150', type: 'number', outer: true },
      { deg: 180, text: '180', type: 'number', outer: true }, { deg: 210, text: '210', type: 'number', outer: true },
      { deg: 240, text: '240', type: 'number', outer: true }, { deg: 270, text: '270', type: 'number', outer: true },
      { deg: 300, text: '300', type: 'number', outer: true }, { deg: 330, text: '330', type: 'number', outer: true },
      
      { deg: 0, text: 'N', type: 'letter', outer: false }, { deg: 90, text: 'E', type: 'letter', outer: false },
      { deg: 180, text: 'S', type: 'letter', outer: false }, { deg: 270, text: 'W', type: 'letter', outer: false }
    ];

    let currentRotation = 0; 
    let secretTarget = null;
    let isMagicMode = false;
    let locationFetched = false;

    const dial = document.getElementById('dial');
    const labelsContainer = document.getElementById('labelsContainer');
    const headingText = document.getElementById('headingText');
    const overlay = document.getElementById('calibration-overlay');
    const levelBubble = document.getElementById('level-bubble');

    function drawTicks() {
      const canvas = document.getElementById('ticksCanvas');
      const ctx = canvas.getContext('2d');
      const cx = 170, cy = 170;
      
      ctx.clearRect(0, 0, 340, 340);
      
      ctx.strokeStyle = '#ffffff';
      for (let i = 0; i < 360; i += 2) {
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(i * Math.PI / 180);
        ctx.beginPath();
        
        ctx.lineWidth = (i % 30 === 0) ? 2.5 : 1;
        ctx.moveTo(0, -135);
        ctx.lineTo(0, -115);
        ctx.stroke();
        ctx.restore();
      }

      ctx.save();
      ctx.translate(cx, cy);
      ctx.fillStyle = '#ff453a';
      ctx.beginPath();
      ctx.moveTo(0, -145);
      ctx.lineTo(-5, -137); 
      ctx.lineTo(5, -137);  
      ctx.fill();
      ctx.restore();
    }

    function initLabels() {
      labels.forEach(label => {
        const container = document.createElement('div');
        container.className = 'label-container';
        container.style.transform = `rotate(${label.deg}deg)`;

        const textSpan = document.createElement('div');
        textSpan.className = `label-text ${label.type === 'letter' ? 'text-[32px] font-normal' : 'text-[15px] font-medium'}`;
        
        const radiusDist = label.outer ? -154 : -75; 
        textSpan.style.marginTop = `${radiusDist}px`; 
        
        textSpan.innerText = label.text;
        textSpan.id = `label-${label.deg}-${label.outer ? 'out' : 'in'}`;
        
        container.appendChild(textSpan);
        labelsContainer.appendChild(container);
      });
    }

    function getDirection(degrees) {
      const arr = ["N", "NE", "E", "SE", "S", "SW", "W", "NW"];
      return arr[Math.floor(((degrees + 22.5) % 360) / 45)];
    }

    function updateCompassDisplay() {
      dial.style.transform = `rotate(${currentRotation}deg)`;

      labels.forEach(label => {
        const id = `label-${label.deg}-${label.outer ? 'out' : 'in'}`;
        const el = document.getElementById(id);
        el.style.transform = `translate(-50%, -50%) rotate(${-(currentRotation + label.deg)}deg)`;
      });

      let heading = Math.round(((-(currentRotation % 360)) + 360) % 360);
      if (heading === 360) heading = 0;
      headingText.innerText = `${heading}° ${getDirection(heading)}`;
    }

    function toDMS(coord, isLat) {
      const absolute = Math.abs(coord);
      const degrees = Math.floor(absolute);
      const minutesNotTruncated = (absolute - degrees) * 60;
      const minutes = Math.floor(minutesNotTruncated);
      const seconds = Math.floor((minutesNotTruncated - minutes) * 60);
      const dir = isLat ? (coord >= 0 ? "N" : "S") : (coord >= 0 ? "E" : "W");
      return `${degrees}°${minutes}'${seconds}" ${dir}`;
    }

    function attachOrientationListener() {
      window.removeEventListener('deviceorientation', handleOrientation);
      window.removeEventListener('deviceorientationabsolute', handleOrientation);

      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission()
          .then(permissionState => {
            if (permissionState === 'granted') {
              window.addEventListener('deviceorientation', handleOrientation);
              startGPS();
            } else {
              alert("Akses sensor ditolak. Restart app ya.");
            }
          }).catch(console.error);
      } else {
        if ('ondeviceorientationabsolute' in window) {
          window.addEventListener('deviceorientationabsolute', handleOrientation);
        } else {
          window.addEventListener('deviceorientation', handleOrientation);
        }
        startGPS();
      }
    }

    function requestPermissions() {
      overlay.style.opacity = '0';
      setTimeout(() => overlay.remove(), 300);
      attachOrientationListener();
    }

    function startGPS() {
      if (!navigator.geolocation) {
        document.getElementById('cityText').innerText = "GPS tidak didukung";
        return;
      }

      navigator.geolocation.watchPosition(
        pos => {
          const lat = pos.coords.latitude;
          const lon = pos.coords.longitude;
          const alt = pos.coords.altitude;
          
          document.getElementById('coordsText').innerText = `${toDMS(lat, true)} ${toDMS(lon, false)}`;
          
          const altText = (alt !== null && alt !== undefined) ? `${Math.round(alt)} m Elevation` : "Elevation N/A";
          document.getElementById('elevationText').innerText = altText;

          if (!locationFetched) {
            locationFetched = true; 
            fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`, {
              headers: { 
                'Accept-Language': 'id-ID,id;q=0.9',
                'User-Agent': 'CompassMagicApp/1.0'
              }
            })
              .then(res => res.json())
              .then(data => {
                if (data.address) {
                  const city = data.address.city || data.address.town || data.address.village || data.address.county || data.address.state || "Lokasi Ditemukan";
                  document.getElementById('cityText').innerText = city;
                }
              }).catch(() => {
                document.getElementById('cityText').innerText = "Area Lokal";
                locationFetched = false; 
              });
          }
        }, 
        err => {
          console.warn('GPS Error', err);
        }, 
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    }

    function handleOrientation(event) {
      let beta = event.beta || 0; 
      let gamma = event.gamma || 0; 
      
      let xMove = Math.max(-55, Math.min(55, gamma * 0.6));
      let yMove = Math.max(-55, Math.min(55, beta * 0.6));
      levelBubble.style.transform = `translate(calc(-50% + ${xMove}px), calc(-50% + ${yMove}px))`;

      if (isMagicMode) return;

      let heading = event.webkitCompassHeading ?? event.alpha;
      if (heading == null) return;

      let diff = (-heading) - currentRotation;
      while (diff < -180) diff += 360;
      while (diff > 180) diff -= 360;
      
      currentRotation += diff * 0.35; 
      updateCompassDisplay();
    }

    window.setTarget = function(angle) {
      if (isMagicMode) return;
      secretTarget = angle;
      if (navigator.vibrate) navigator.vibrate([10, 30, 10]); 
    }

    window.triggerSpin = function() {
      if (isMagicMode || secretTarget === null) return;
      isMagicMode = true;
      if (navigator.vibrate) navigator.vibrate(50); 
      
      let spins = 5;
      let finalRotation = currentRotation - (spins * 360 + (currentRotation % 360 - secretTarget));

      const startRotation = currentRotation;
      const duration = 5000; 
      let startTime = null;

      function easeOutExpo(x) {
        return x === 1 ? 1 : 1 - Math.pow(2, -10 * x);
      }

      function animate(currentTime) {
        if (!startTime) startTime = currentTime;
        const timeElapsed = currentTime - startTime;
        const progress = Math.min(timeElapsed / duration, 1);

        currentRotation = startRotation + (finalRotation - startRotation) * easeOutExpo(progress);
        updateCompassDisplay();

        if (progress < 1) {
          requestAnimationFrame(animate);
        } else {
          isMagicMode = false;
          secretTarget = null;
        }
      }
      requestAnimationFrame(animate);
    }

    drawTicks();
    initLabels();
    updateCompassDisplay();

  </script>
</body>
</html>
