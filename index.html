<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Compass">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#000000">
  <title>Compass</title>

  <link rel="apple-touch-icon" href="icon-512.png">
  <link rel="icon" type="image/png" href="icon-512.png">

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
      background-color: #000;
      color: #fff;
      margin: 0;
      overflow: hidden;
      touch-action: none;
    }
    
    #calibration-overlay {
      position: absolute; inset: 0; background-color: #000; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: opacity 0.3s;
    }

    /* Kustomisasi Slider iOS Style */
    input[type=range] {
      -webkit-appearance: none;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      height: 6px;
      outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #ffffff;
      cursor: pointer;
      box-shadow: 0 2px 5px rgba(0,0,0,0.4);
    }

    .label-container { position: absolute; left: 50%; top: 50%; width: 0; height: 0; }
    .label-text { position: absolute; transform: translate(-50%, -50%); text-align: center; }
    
    #magic-indicator {
      transition: opacity 0.2s ease-in-out;
    }
  </style>

</head>
<body class="fixed inset-0 bg-black select-none overflow-hidden text-white">

  <!-- Overlay Kalibrasi -->
  <div id="calibration-overlay" onclick="startAppManual()">
    <div class="text-center">
      <svg class="w-12 h-12 text-white mx-auto mb-4 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      <p class="text-lg font-medium text-gray-300 tracking-wide">Tap to begin</p>
    </div>
  </div>

  <!-- Settings Modal Rahasia -->
  <div id="settings-modal" class="fixed inset-0 bg-black/70 backdrop-blur-md z-[999] hidden items-center justify-center p-6 opacity-0 transition-opacity duration-300">
    <div class="bg-[#1c1c1e] w-full max-w-sm rounded-[28px] p-6 border border-white/10 shadow-2xl transform scale-95 transition-transform duration-300" id="settings-card">
      <h2 class="text-[22px] font-semibold text-white mb-1">Magic Settings</h2>
      <p class="text-[13px] text-gray-400 mb-6">Configure the secret compass behavior.</p>

      <div class="space-y-5">
        <div>
          <div class="flex justify-between items-center mb-1.5">
            <label class="text-[14px] text-gray-200">Tilt Threshold</label>
            <span id="val-threshold" class="text-[14px] text-[#007aff] font-semibold">30°</span>
          </div>
          <input type="range" id="set-threshold" min="10" max="80" step="1" value="30" class="w-full" oninput="document.getElementById('val-threshold').innerText = this.value + '°'">
        </div>
        <div>
          <div class="flex justify-between items-center mb-1.5">
            <label class="text-[14px] text-gray-200">Hold Tilt</label>
            <span id="val-hold" class="text-[14px] text-[#007aff] font-semibold">1.5s</span>
          </div>
          <input type="range" id="set-hold" min="0.5" max="5.0" step="0.1" value="1.5" class="w-full" oninput="document.getElementById('val-hold').innerText = parseFloat(this.value).toFixed(1) + 's'">
        </div>
        <div>
          <div class="flex justify-between items-center mb-1.5">
            <label class="text-[14px] text-gray-200">Table Delay</label>
            <span id="val-delay" class="text-[14px] text-[#007aff] font-semibold">3.0s</span>
          </div>
          <input type="range" id="set-delay" min="1.0" max="10.0" step="0.1" value="3.0" class="w-full" oninput="document.getElementById('val-delay').innerText = parseFloat(this.value).toFixed(1) + 's'">
        </div>
        <div>
          <div class="flex justify-between items-center mb-1.5">
            <label class="text-[14px] text-gray-200">Shake Duration</label>
            <span id="val-shake" class="text-[14px] text-[#007aff] font-semibold">2.5s</span>
          </div>
          <input type="range" id="set-shake" min="0.5" max="8.0" step="0.1" value="2.5" class="w-full" oninput="document.getElementById('val-shake').innerText = parseFloat(this.value).toFixed(1) + 's'">
        </div>
        <div>
          <div class="flex justify-between items-center mb-1.5">
            <label class="text-[14px] text-gray-200">Spin Animation</label>
            <span id="val-anim" class="text-[14px] text-[#007aff] font-semibold">3.0s</span>
          </div>
          <input type="range" id="set-anim" min="1.0" max="10.0" step="0.1" value="3.0" class="w-full" oninput="document.getElementById('val-anim').innerText = parseFloat(this.value).toFixed(1) + 's'">
        </div>
      </div>

      <div class="mt-8 space-y-3">
        <button onclick="saveSettings()" class="w-full bg-[#007aff] hover:bg-[#007aff]/80 active:bg-[#007aff]/60 text-white font-semibold py-3 px-4 rounded-xl text-[16px] transition-colors">Save & Close</button>
        <button onclick="resetApp()" class="w-full bg-transparent hover:bg-red-500/10 active:bg-red-500/20 text-[#ff453a] font-medium py-3 px-4 rounded-xl text-[15px] transition-colors">Reset to Defaults</button>
      </div>
    </div>
  </div>

  <!-- CONTAINER KOMPAS -->
  <div class="absolute top-[18vh] left-0 w-full flex justify-center z-10 pointer-events-none">
    <div class="relative w-[320px] h-[320px]">
      
      <div class="absolute top-[-5px] left-1/2 -translate-x-1/2 w-[3px] h-[45px] bg-white z-20"></div>

      <div id="dial" class="absolute inset-0 w-full h-full z-10 will-change-transform">
        <canvas id="ticksCanvas" width="320" height="320" class="absolute inset-0"></canvas>
        <div id="labelsContainer" class="absolute inset-0"></div>
      </div>

      <div class="absolute inset-0 flex items-center justify-center z-0">
        <div class="absolute w-[180px] h-[1px] bg-white opacity-20"></div>
        <div class="absolute w-[1px] h-[180px] bg-white opacity-20"></div>
        
        <div id="level-bubble" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[90px] h-[90px] bg-[#1c1c1e] bg-opacity-80 rounded-full flex items-center justify-center shadow-inner will-change-transform">
          <div class="relative w-[18px] h-[18px]">
            <div class="absolute top-1/2 left-0 w-full h-[1px] bg-white opacity-50"></div>
            <div class="absolute top-0 left-1/2 w-[1px] h-full bg-white opacity-50"></div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- CONTAINER TEKS DIBAWAH -->
  <!-- Dikurangi 25px dari sebelumnya (30px -> 5px) setara 0.65cm -->
  <div class="absolute left-0 w-full flex flex-col items-center z-20" style="bottom: calc(env(safe-area-inset-bottom) + 5px);">
    
    <h1 id="headingText" onclick="armMagic()" class="leading-none pointer-events-auto tracking-tight" style="font-size: 3rem; font-weight: 100; margin-bottom: 24px;">0° N</h1>

    <div class="flex flex-col items-center justify-center text-[17px] font-medium pointer-events-auto w-full">
      <p id="coordsText" class="tracking-wide mb-3">--°--<span id="magic-indicator">'</span>--" N --°--'--" E</p>
      <p id="cityText" class="tracking-wide mb-2.5">Locating...</p>
      <p id="elevationText" onclick="handleElevationTap()" class="tracking-wide m-0">Elevation N/A</p>
    </div>

  </div>

  <script>
    const labels = [
      { deg: 0, text: '0', type: 'number', outer: true }, { deg: 30, text: '30', type: 'number', outer: true },
      { deg: 60, text: '60', type: 'number', outer: true }, { deg: 90, text: '90', type: 'number', outer: true },
      { deg: 120, text: '120', type: 'number', outer: true }, { deg: 150, text: '150', type: 'number', outer: true },
      { deg: 180, text: '180', type: 'number', outer: true }, { deg: 210, text: '210', type: 'number', outer: true },
      { deg: 240, text: '240', type: 'number', outer: true }, { deg: 270, text: '270', type: 'number', outer: true },
      { deg: 300, text: '300', type: 'number', outer: true }, { deg: 330, text: '330', type: 'number', outer: true },
      { deg: 0, text: 'N', type: 'letter', outer: false }, { deg: 90, text: 'E', type: 'letter', outer: false },
      { deg: 180, text: 'S', type: 'letter', outer: false }, { deg: 270, text: 'W', type: 'letter', outer: false }
    ];

    let mConf = {
      threshold: 30,
      holdTime: 1500,
      flatDelay: 3000,
      shakeTime: 2500,
      animTime: 3000
    };

    try {
      const saved = JSON.parse(localStorage.getItem('compassMagicSettings'));
      if(saved) mConf = {...mConf, ...saved};
    } catch(e){}

    let mState = 'IDLE'; 
    let isArmed = false; 
    
    let rawBeta = 0, rawGamma = 0;
    let tiltStart = 0;
    let activeDirection = null; 
    let stateTimer = 0;
    let startAnimHeading = 0;
    let isTrueNorth = false;
    let shakeOffset = 0;
    let magicIndicatorEl = null;

    let tapCount = 0;
    let tapTimeout = null;

    let targetHeading = 0, currentHeading = 0;
    let targetTiltX = 0, currentTiltX = 0;
    let targetTiltY = 0, currentTiltY = 0;
    const HEADING_SMOOTHING = 0.35; 
    const TILT_SMOOTHING = 0.15;

    let isRunning = false;
    let watchId = null;
    let lastFetchedLat = null, lastFetchedLon = null;
    let hasRequestedPermission = false;
    let watchdogTimer = null;
    let altitudeFetched = false;

    const dial = document.getElementById('dial');
    const labelsContainer = document.getElementById('labelsContainer');
    const headingText = document.getElementById('headingText');
    const levelBubble = document.getElementById('level-bubble');
    const coordsText = document.getElementById('coordsText');
    const cityText = document.getElementById('cityText');
    const elevationText = document.getElementById('elevationText');
    const overlay = document.getElementById('calibration-overlay');
    const settingsModal = document.getElementById('settings-modal');
    const settingsCard = document.getElementById('settings-card');

    window.armMagic = function() {
      if (!isArmed && mState === 'IDLE') {
        isArmed = true;
        console.log("Magic is armed! Tilt now."); 
      }
    }

    function openSettings() {
      document.getElementById('set-threshold').value = mConf.threshold;
      document.getElementById('set-hold').value = mConf.holdTime / 1000;
      document.getElementById('set-delay').value = mConf.flatDelay / 1000;
      document.getElementById('set-shake').value = mConf.shakeTime / 1000;
      document.getElementById('set-anim').value = mConf.animTime / 1000;
      
      document.getElementById('val-threshold').innerText = mConf.threshold + '°';
      document.getElementById('val-hold').innerText = (mConf.holdTime / 1000).toFixed(1) + 's';
      document.getElementById('val-delay').innerText = (mConf.flatDelay / 1000).toFixed(1) + 's';
      document.getElementById('val-shake').innerText = (mConf.shakeTime / 1000).toFixed(1) + 's';
      document.getElementById('val-anim').innerText = (mConf.animTime / 1000).toFixed(1) + 's';
      
      settingsModal.classList.remove('hidden');
      settingsModal.classList.add('flex');
      
      requestAnimationFrame(() => {
        settingsModal.classList.remove('opacity-0');
        settingsCard.classList.remove('scale-95');
        settingsCard.classList.add('scale-100');
      });
    }

    function closeSettings() {
      settingsModal.classList.add('opacity-0');
      settingsCard.classList.remove('scale-100');
      settingsCard.classList.add('scale-95');
      
      setTimeout(() => {
        settingsModal.classList.add('hidden');
        settingsModal.classList.remove('flex');
      }, 300);
    }

    function handleElevationTap() {
      tapCount++;
      clearTimeout(tapTimeout);
      tapTimeout = setTimeout(() => tapCount = 0, 1000);
      if(tapCount >= 5) {
        openSettings();
        tapCount = 0;
      }
    }

    window.saveSettings = function() {
      mConf.threshold = parseFloat(document.getElementById('set-threshold').value);
      mConf.holdTime = parseFloat(document.getElementById('set-hold').value) * 1000;
      mConf.flatDelay = parseFloat(document.getElementById('set-delay').value) * 1000;
      mConf.shakeTime = parseFloat(document.getElementById('set-shake').value) * 1000;
      mConf.animTime = parseFloat(document.getElementById('set-anim').value) * 1000;
      
      localStorage.setItem('compassMagicSettings', JSON.stringify(mConf));
      closeSettings();
      mState = 'IDLE';
      isArmed = false;
    }

    window.resetApp = function() {
      if(confirm("Are you sure you want to reset all settings?")) {
        localStorage.clear();
        location.reload();
      }
    }

    function drawTicks() {
      const canvas = document.getElementById('ticksCanvas');
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, 320, 320);
      ctx.strokeStyle = '#ffffff';
      for (let i = 0; i < 360; i += 2) {
        ctx.save();
        ctx.translate(160, 160);
        ctx.rotate(i * Math.PI / 180);
        ctx.beginPath();
        ctx.lineWidth = (i % 30 === 0) ? 2 : 1;
        ctx.moveTo(0, -135);
        ctx.lineTo(0, -118);
        ctx.stroke();
        ctx.restore();
      }
      ctx.save();
      ctx.translate(160, 160);
      ctx.fillStyle = '#ff3b30';
      ctx.beginPath();
      ctx.moveTo(0, -148);
      ctx.lineTo(-5, -138); 
      ctx.lineTo(5, -138);  
      ctx.fill();
      ctx.restore();
    }

    function initLabels() {
      labelsContainer.innerHTML = '';
      labels.forEach(label => {
        const container = document.createElement('div');
        container.className = 'label-container';
        container.style.transform = `rotate(${label.deg}deg)`;
        const textSpan = document.createElement('div');
        textSpan.className = `label-text ${label.type === 'letter' ? 'text-[32px] font-normal' : 'text-[14px] font-medium text-gray-200'}`;
        textSpan.style.marginTop = `${label.outer ? -165 : -70}px`; 
        textSpan.innerText = label.text;
        textSpan.id = `label-${label.deg}-${label.outer ? 'out' : 'in'}`;
        container.appendChild(textSpan);
        labelsContainer.appendChild(container);
      });
    }

    function getDirection(degrees) {
      const arr = ["N", "NE", "E", "SE", "S", "SW", "W", "NW"];
      return arr[Math.floor(((degrees + 22.5) % 360) / 45)];
    }

    function easeInOutCubic(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }

    function renderLoop() {
      if (!isRunning) return;
      const now = Date.now();
      
      if(!magicIndicatorEl) magicIndicatorEl = document.getElementById('magic-indicator');

      if (magicIndicatorEl) {
        if (mState === 'TILTING' || mState === 'BLINKING_INDICATOR') {
          magicIndicatorEl.style.opacity = '0';
        } else {
          magicIndicatorEl.style.opacity = '1';
        }
      }

      let isOverridingHeading = false;
      let isFlat = Math.abs(rawBeta) < 15 && Math.abs(rawGamma) < 15;

      if (mState === 'IDLE') {
        if (isArmed) {
          if (rawBeta < -mConf.threshold) { activeDirection = 0; mState = 'TILTING'; tiltStart = now; }       
          else if (rawBeta > mConf.threshold) { activeDirection = 180; mState = 'TILTING'; tiltStart = now; } 
          else if (rawGamma > mConf.threshold) { activeDirection = 270; mState = 'TILTING'; tiltStart = now; } 
          else if (rawGamma < -mConf.threshold) { activeDirection = 90; mState = 'TILTING'; tiltStart = now; } 
        }
      } 
      else if (mState === 'TILTING') {
        let match = false;
        if (activeDirection === 0 && rawBeta < -mConf.threshold) match = true;
        else if (activeDirection === 180 && rawBeta > mConf.threshold) match = true;
        else if (activeDirection === 270 && rawGamma > mConf.threshold) match = true;
        else if (activeDirection === 90 && rawGamma < -mConf.threshold) match = true;

        if (!match) mState = 'IDLE'; 
        else if (now - tiltStart > mConf.holdTime) {
          mState = 'LOCKED';
          if(navigator.vibrate) navigator.vibrate([15, 30, 15]);
        }
      } 
      else if (mState === 'LOCKED') {
        if (isFlat) { mState = 'ON_TABLE'; stateTimer = now; }
      } 
      else if (mState === 'ON_TABLE') {
        if (!isFlat) mState = 'LOCKED'; 
        else if (now - stateTimer > mConf.flatDelay) {
          mState = 'BLINKING_INDICATOR';
          stateTimer = now;
        }
      } 
      else if (mState === 'BLINKING_INDICATOR') {
        if (now - stateTimer > 250) {
          mState = 'WAITING_ANIMATION';
          stateTimer = now;
        }
      }
      else if (mState === 'WAITING_ANIMATION') {
        if (now - stateTimer > 250) {
          mState = 'ANIMATING';
          stateTimer = now;
          startAnimHeading = currentHeading;
          
          let normalizedHeading = ((startAnimHeading % 360) + 360) % 360;
          let isFacingNorth = (normalizedHeading >= 352 || normalizedHeading <= 8);
          isTrueNorth = (activeDirection === 0 && isFacingNorth);
        }
      }
      else if (mState === 'ANIMATING') {
        isOverridingHeading = true;
        let progress = Math.min((now - stateTimer) / mConf.animTime, 1);
        let ease = easeInOutCubic(progress);

        if (isTrueNorth) {
          currentHeading = startAnimHeading + (360 * ease);
        } else {
          let diff = activeDirection - (startAnimHeading % 360);
          if (diff < -180) diff += 360;
          if (diff > 180) diff -= 360;
          currentHeading = startAnimHeading + (diff * ease);
        }

        if (progress >= 1) { mState = 'SHAKING'; stateTimer = now; }
      } 
      else if (mState === 'SHAKING') {
        isOverridingHeading = true;
        shakeOffset = Math.sin(now / 15) * 1.5; 
        currentHeading = (isTrueNorth ? (startAnimHeading + 360) : activeDirection) + shakeOffset;

        if (now - stateTimer > mConf.shakeTime) {
          mState = 'RETURNING'; 
          stateTimer = now; 
          startAnimHeading = currentHeading - shakeOffset; 
        }
      } 
      else if (mState === 'RETURNING') {
        isOverridingHeading = true;
        let progress = Math.min((now - stateTimer) / (mConf.animTime * 1.5), 1); 
        let ease = easeInOutCubic(progress);

        let diff = targetHeading - startAnimHeading;
        while (diff < -180) diff += 360;
        while (diff > 180) diff -= 360;
        
        currentHeading = startAnimHeading + (diff * ease);
        if (progress >= 1) {
          mState = 'IDLE';
          isArmed = false; 
        }
      }

      if (!isOverridingHeading) {
        let diffHeading = targetHeading - currentHeading;
        while (diffHeading < -180) diffHeading += 360;
        while (diffHeading > 180) diffHeading -= 360;
        currentHeading += diffHeading * HEADING_SMOOTHING;
      }

      currentTiltX += (targetTiltX - currentTiltX) * TILT_SMOOTHING;
      currentTiltY += (targetTiltY - currentTiltY) * TILT_SMOOTHING;

      dial.style.transform = `rotate(${-currentHeading}deg)`;
      levelBubble.style.transform = `translate(calc(-50% + ${currentTiltX}px), calc(-50% + ${currentTiltY}px))`;

      labels.forEach(label => {
        const el = document.getElementById(`label-${label.deg}-${label.outer ? 'out' : 'in'}`);
        if (el) {
          el.style.transform = `translate(-50%, -50%) rotate(${currentHeading - label.deg}deg)`;
        }
      });

      let displayHeading = Math.round((currentHeading % 360 + 360) % 360);
      headingText.innerText = `${displayHeading}° ${getDirection(displayHeading)}`;

      requestAnimationFrame(renderLoop);
    }

    function resetWatchdog() {
      clearTimeout(watchdogTimer);
      watchdogTimer = setTimeout(() => {
        if (hasRequestedPermission && document.visibilityState === 'visible') attachOrientationListener(true);
      }, 3000);
    }

    function handleOrientation(event) {
      if (!event) return;
      resetWatchdog();

      rawBeta = event.beta || 0;
      rawGamma = event.gamma || 0;

      let sensitivity = 1.6;
      let bX = -rawGamma * sensitivity;
      let bY = rawBeta * sensitivity;

      let maxRadius = 60;
      let dist = Math.sqrt(bX * bX + bY * bY);
      if (dist > maxRadius) {
        bX = (bX / dist) * maxRadius;
        bY = (bY / dist) * maxRadius;
      }

      targetTiltX = bX;
      targetTiltY = bY;

      let heading = event.webkitCompassHeading ?? (event.alpha !== null ? 360 - event.alpha : null);
      if (heading !== null) targetHeading = heading;
    }

    function attachOrientationListener(isAutoStart = false) {
      window.removeEventListener('deviceorientation', handleOrientation);
      window.removeEventListener('deviceorientationabsolute', handleOrientation);

      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        if (!isAutoStart) {
          DeviceOrientationEvent.requestPermission()
            .then(permissionState => {
              if (permissionState === 'granted') {
                window.addEventListener('deviceorientation', handleOrientation);
                hasRequestedPermission = true;
                startEngine();
              } else {
                alert("Sensor access denied. Please refresh to try again.");
                document.getElementById('calibration-overlay').style.display = 'flex';
              }
            }).catch(() => { document.getElementById('calibration-overlay').style.display = 'flex'; });
        } else {
          window.addEventListener('deviceorientation', handleOrientation);
          startEngine();
        }
      } else {
        hasRequestedPermission = true;
        if ('ondeviceorientationabsolute' in window) window.addEventListener('deviceorientationabsolute', handleOrientation);
        else window.addEventListener('deviceorientation', handleOrientation);
        startEngine();
      }
    }

    function startEngine() {
      if (overlay) {
        overlay.style.opacity = '0';
        setTimeout(() => { if (overlay) overlay.style.display = 'none'; }, 300);
      }
      if (!isRunning) {
        isRunning = true;
        requestAnimationFrame(renderLoop);
      }
      startGPS();
      resetWatchdog();
    }

    function toDMS(coord, isLat, isFirst) {
      const absolute = Math.abs(coord);
      const degrees = Math.floor(absolute);
      const minutesNotTruncated = (absolute - degrees) * 60;
      const minutes = Math.floor(minutesNotTruncated);
      const seconds = Math.floor((minutesNotTruncated - minutes) * 60);
      const dir = isLat ? (coord >= 0 ? "N" : "S") : (coord >= 0 ? "E" : "W");
      
      const minuteSymbol = isFirst ? `<span id="magic-indicator">'</span>` : `'`;
      return `${degrees}°${minutes}${minuteSymbol}${seconds}" ${dir}`;
    }

    function getDistance(lat1, lon1, lat2, lon2) {
      const R = 6371e3; 
      const p1 = lat1 * Math.PI/180;
      const p2 = lat2 * Math.PI/180;
      const dp = (lat2-lat1) * Math.PI/180;
      const dl = (lon2-lon1) * Math.PI/180;
      const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
      return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    async function fetchAltitudeFallback(lat, lon) {
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 5000);
        const res = await fetch(`https://api.open-elevation.com/api/v1/lookup?locations=${lat},${lon}`, { signal: controller.signal });
        clearTimeout(timeoutId);
        const data = await res.json();
        if (data && data.results && data.results[0]) {
          elevationText.innerText = `${Math.round(data.results[0].elevation)} m Elevation`;
        }
      } catch (e) {}
    }

    function startGPS() {
      if (!navigator.geolocation) return;
      
      if (watchId !== null) { 
        navigator.geolocation.clearWatch(watchId); 
        watchId = null; 
      }

      watchId = navigator.geolocation.watchPosition(
        pos => {
          const lat = pos.coords.latitude; const lon = pos.coords.longitude;
          let alt = pos.coords.altitude;
          
          coordsText.innerHTML = `${toDMS(lat, true, true)} ${toDMS(lon, false, false)}`;
          magicIndicatorEl = document.getElementById('magic-indicator'); 
          
          if (alt !== null && alt !== undefined && alt !== 0) {
            elevationText.innerText = `${Math.round(alt)} m Elevation`;
          } else if (!altitudeFetched) {
            altitudeFetched = true;
            fetchAltitudeFallback(lat, lon);
          }
          
          if (!lastFetchedLat || getDistance(lastFetchedLat, lastFetchedLon, lat, lon) > 50) {
            lastFetchedLat = lat; lastFetchedLon = lon;
            fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`, { headers: { 'User-Agent': 'NativeCompassClone/1.0' }})
            .then(res => res.json())
            .then(data => { if (data.address) cityText.innerText = data.address.city || data.address.town || data.address.county || "Location Found"; })
            .catch(() => {});
          }
        }, 
        () => {}, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    }

    function stopSensors() {
      isRunning = false;
      window.removeEventListener('deviceorientationabsolute', handleOrientation);
      window.removeEventListener('deviceorientation', handleOrientation);
      clearTimeout(watchdogTimer);
      if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
    }

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === 'visible' && hasRequestedPermission) attachOrientationListener(true);
      else stopSensors();
    });

    window.startAppManual = function() { attachOrientationListener(false); }
    
    drawTicks(); initLabels();
  </script>

</body>
</html>
