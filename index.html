  <script>
    const labels = [
      { deg: 0,   text: '0',   type: 'number', outer: true  }, { deg: 30,  text: '30',  type: 'number', outer: true  },
      { deg: 60,  text: '60',  type: 'number', outer: true  }, { deg: 90,  text: '90',  type: 'number', outer: true  },
      { deg: 120, text: '120', type: 'number', outer: true  }, { deg: 150, text: '150', type: 'number', outer: true  },
      { deg: 180, text: '180', type: 'number', outer: true  }, { deg: 210, text: '210', type: 'number', outer: true  },
      { deg: 240, text: '240', type: 'number', outer: true  }, { deg: 270, text: '270', type: 'number', outer: true  },
      { deg: 300, text: '300', type: 'number', outer: true  }, { deg: 330, text: '330', type: 'number', outer: true  },
      { deg: 0,   text: 'N',   type: 'letter', outer: false }, { deg: 90,  text: 'E',   type: 'letter', outer: false },
      { deg: 180, text: 'S',   type: 'letter', outer: false }, { deg: 270, text: 'W',   type: 'letter', outer: false }
    ];

    let mConf = {
      enableSwipe: true, enableGlitch: true,
      glitchDuration: 600, glitchSpeed: 5,
      threshold: 30, holdTime: 1500,
      flatDelay: 3000, shakeTime: 2500, animTime: 3000
    };
    try {
      const saved = JSON.parse(localStorage.getItem('compassMagicSettings'));
      if (saved) mConf = { ...mConf, ...saved };
    } catch(e) {}

    let mState = 'IDLE', isArmed = false;
    let rawBeta = 0, rawGamma = 0;
    let tiltStart = 0, activeDirection = null, stateTimer = 0;
    let startAnimHeading = 0, isTrueNorth = false, shakeOffset = 0;
    let magicIndicatorEl = null;
    let tapCount = 0, tapTimeout = null;

    let targetHeading = 0, currentHeading = 0;
    let targetTiltX = 0, currentTiltX = 0;
    let targetTiltY = 0, currentTiltY = 0;
    const HEADING_SMOOTHING = 0.35;
    const TILT_SMOOTHING = 0.15;

    let isRunning = false, watchId = null;
    let lastFetchedLat = null, lastFetchedLon = null;
    let hasRequestedPermission = false, watchdogTimer = null, altitudeFetched = false;

    let touchStartX = 0, touchStartY = 0;
    const SWIPE_THRESHOLD = 40;

    const dial          = document.getElementById('dial');
    const labelsContainer = document.getElementById('labelsContainer');
    const headingText   = document.getElementById('headingText');
    const levelBubble   = document.getElementById('level-bubble');
    const coordsText    = document.getElementById('coordsText');
    const cityText      = document.getElementById('cityText');
    const elevationText = document.getElementById('elevationText');
    const overlay       = document.getElementById('calibration-overlay');
    const settingsModal = document.getElementById('settings-modal');
    const settingsContent = document.getElementById('settings-content');

    window.armMagic = function() {
      if (!isArmed && mState === 'IDLE') isArmed = true;
    };

    window.toggleGlitchOptions = function() {
      const isChecked = document.getElementById('set-glitch').checked;
      document.getElementById('glitch-options').classList.toggle('hidden', !isChecked);
    };

    function openSettings() {
      document.getElementById('set-swipe').checked    = mConf.enableSwipe;
      document.getElementById('set-glitch').checked   = mConf.enableGlitch;
      document.getElementById('set-g-dur').value      = mConf.glitchDuration / 1000;
      document.getElementById('set-g-spd').value      = mConf.glitchSpeed;
      document.getElementById('set-threshold').value  = mConf.threshold;
      document.getElementById('set-hold').value       = mConf.holdTime / 1000;
      document.getElementById('set-delay').value      = mConf.flatDelay / 1000;
      document.getElementById('set-shake').value      = mConf.shakeTime / 1000;
      document.getElementById('set-anim').value       = mConf.animTime / 1000;

      document.getElementById('val-g-dur').innerText      = (mConf.glitchDuration / 1000).toFixed(1) + 's';
      document.getElementById('val-g-spd').innerText      = mConf.glitchSpeed;
      document.getElementById('val-threshold').innerText  = mConf.threshold + '°';
      document.getElementById('val-hold').innerText       = (mConf.holdTime / 1000).toFixed(1) + 's';
      document.getElementById('val-delay').innerText      = (mConf.flatDelay / 1000).toFixed(1) + 's';
      document.getElementById('val-shake').innerText      = (mConf.shakeTime / 1000).toFixed(1) + 's';
      document.getElementById('val-anim').innerText       = (mConf.animTime / 1000).toFixed(1) + 's';

      toggleGlitchOptions();

      settingsModal.classList.remove('hidden');
      settingsModal.scrollTop = 0;

      requestAnimationFrame(() => {
        settingsModal.classList.remove('opacity-0');
        settingsContent.style.transform = 'translateY(0)';
      });
    }

    function closeSettings() {
      settingsModal.classList.add('opacity-0');
      settingsContent.style.transform = 'translateY(40px)';
      setTimeout(() => {
        settingsModal.classList.add('hidden');
      }, 300);
    }

    function handleElevationTap() {
      tapCount++;
      clearTimeout(tapTimeout);
      tapTimeout = setTimeout(() => tapCount = 0, 1000);
      if (tapCount >= 5) { openSettings(); tapCount = 0; }
    }

    window.saveSettings = function() {
      mConf.enableSwipe     = document.getElementById('set-swipe').checked;
      mConf.enableGlitch    = document.getElementById('set-glitch').checked;
      mConf.glitchDuration  = parseFloat(document.getElementById('set-g-dur').value) * 1000;
      mConf.glitchSpeed     = parseInt(document.getElementById('set-g-spd').value);
      mConf.threshold       = parseFloat(document.getElementById('set-threshold').value);
      mConf.holdTime        = parseFloat(document.getElementById('set-hold').value) * 1000;
      mConf.flatDelay       = parseFloat(document.getElementById('set-delay').value) * 1000;
      mConf.shakeTime       = parseFloat(document.getElementById('set-shake').value) * 1000;
      mConf.animTime        = parseFloat(document.getElementById('set-anim').value) * 1000;
      localStorage.setItem('compassMagicSettings', JSON.stringify(mConf));
      closeSettings();
      mState = 'IDLE'; isArmed = false;
    };

    window.resetApp = function() {
      if (confirm("Are you sure you want to reset all settings?")) {
        localStorage.clear(); location.reload();
      }
    };

    // ── SWIPE ──
    document.addEventListener('touchstart', e => {
      if (e.target.closest('#settings-modal')) return;
      touchStartX = e.changedTouches[0].screenX;
      touchStartY = e.changedTouches[0].screenY;
    }, { passive: false });

    document.addEventListener('touchend', e => {
      if (e.target.closest('#settings-modal')) return;
      if (!mConf.enableSwipe) return;
      if (mState !== 'IDLE' && mState !== 'LOCKED') return;

      const dx = e.changedTouches[0].screenX - touchStartX;
      const dy = e.changedTouches[0].screenY - touchStartY;

      if (Math.abs(dx) > SWIPE_THRESHOLD || Math.abs(dy) > SWIPE_THRESHOLD) {
        activeDirection = Math.abs(dx) > Math.abs(dy)
          ? (dx > 0 ? 270 : 90)
          : (dy > 0 ? 180 : 0);
        isArmed = true; mState = 'LOCKED';
        if (navigator.vibrate) navigator.vibrate([15, 30, 15]);
      }
    });

    // ── DRAW ──
    function drawTicks() {
      const canvas = document.getElementById('ticksCanvas');
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, 320, 320);
      ctx.strokeStyle = '#ffffff';
      for (let i = 0; i < 360; i += 2) {
        ctx.save(); ctx.translate(160, 160); ctx.rotate(i * Math.PI / 180);
        ctx.beginPath(); ctx.lineWidth = (i % 30 === 0) ? 2 : 1;
        ctx.moveTo(0, -135); ctx.lineTo(0, -118); ctx.stroke(); ctx.restore();
      }
      ctx.save(); ctx.translate(160, 160); ctx.fillStyle = '#ff3b30';
      ctx.beginPath(); ctx.moveTo(0, -148); ctx.lineTo(-5, -138); ctx.lineTo(5, -138); ctx.fill();
      ctx.restore();
    }

    function initLabels() {
      labelsContainer.innerHTML = '';
      labels.forEach(label => {
        const container = document.createElement('div');
        container.className = 'label-container';
        container.style.transform = `rotate(${label.deg}deg)`;
        const textSpan = document.createElement('div');
        textSpan.className = `label-text ${label.type === 'letter' ? 'text-[22px] font-medium' : 'text-[14px] font-medium text-gray-200'}`;
        textSpan.style.marginTop = `${label.outer ? -165 : -98}px`;
        textSpan.innerText = label.text;
        textSpan.id = `label-${label.deg}-${label.outer ? 'out' : 'in'}`;
        container.appendChild(textSpan);
        labelsContainer.appendChild(container);
      });
    }

    function getDirection(d) {
      return ["N","NE","E","SE","S","SW","W","NW"][Math.floor(((d + 22.5) % 360) / 45)];
    }

    function easeInOutCubic(t) {
      return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;
    }

    // ── RENDER LOOP ──
    function renderLoop() {
      if (!isRunning) return;
      const now = Date.now();

      if (!magicIndicatorEl) magicIndicatorEl = document.getElementById('magic-indicator');
      if (magicIndicatorEl) {
        magicIndicatorEl.style.opacity = (mState === 'TILTING' || mState === 'BLINKING_INDICATOR') ? '0' : '1';
      }

      let isOverridingHeading = false;
      const isFlat = Math.abs(rawBeta) < 15 && Math.abs(rawGamma) < 15;

      if (mState === 'IDLE') {
        if (isArmed) {
          if      (rawBeta  < -mConf.threshold) { activeDirection = 0;   mState = 'TILTING'; tiltStart = now; }
          else if (rawBeta  >  mConf.threshold) { activeDirection = 180; mState = 'TILTING'; tiltStart = now; }
          else if (rawGamma >  mConf.threshold) { activeDirection = 270; mState = 'TILTING'; tiltStart = now; }
          else if (rawGamma < -mConf.threshold) { activeDirection = 90;  mState = 'TILTING'; tiltStart = now; }
        }
      } else if (mState === 'TILTING') {
        let match = (activeDirection === 0   && rawBeta  < -mConf.threshold)
                 || (activeDirection === 180  && rawBeta  >  mConf.threshold)
                 || (activeDirection === 270  && rawGamma >  mConf.threshold)
                 || (activeDirection === 90   && rawGamma < -mConf.threshold);
        if (!match) mState = 'IDLE';
        else if (now - tiltStart > mConf.holdTime) {
          mState = 'LOCKED';
          if (navigator.vibrate) navigator.vibrate([15, 30, 15]);
        }
      } else if (mState === 'LOCKED') {
        if (isFlat) { mState = 'ON_TABLE'; stateTimer = now; }
      } else if (mState === 'ON_TABLE') {
        if (!isFlat) mState = 'LOCKED';
        else if (now - stateTimer > mConf.flatDelay) { mState = 'BLINKING_INDICATOR'; stateTimer = now; }
      } else if (mState === 'BLINKING_INDICATOR') {
        if (now - stateTimer > 250) { mState = 'WAITING_ANIMATION'; stateTimer = now; }
      } else if (mState === 'WAITING_ANIMATION') {
        if (now - stateTimer > 250) {
          startAnimHeading = currentHeading;
          const norm = ((startAnimHeading % 360) + 360) % 360;
          isTrueNorth = (activeDirection === 0 && (norm >= 352 || norm <= 8));
          if (isTrueNorth) {
            window.finalTargetHeading = startAnimHeading + 360;
          } else {
            let diff = activeDirection - (startAnimHeading % 360);
            if (diff < -180) diff += 360;
            if (diff >  180) diff -= 360;
            window.finalTargetHeading = startAnimHeading + diff;
          }
          mState = mConf.enableGlitch ? 'GLITCHING' : 'ANIMATING';
          stateTimer = now;
        }
      } else if (mState === 'GLITCHING') {
        isOverridingHeading = true;
        if (typeof window.glitchTarget === 'undefined') window.glitchTarget = currentHeading;
        const chaos = mConf.glitchSpeed;
        if (Math.random() < 0.05 + chaos * 0.02) {
          const range = window.finalTargetHeading - startAnimHeading;
          window.glitchTarget = startAnimHeading + range * ((Math.random() * 1.4) - 0.2);
        }
        currentHeading += (window.glitchTarget - currentHeading) * (0.05 + chaos * 0.03);
        if (now - stateTimer > mConf.glitchDuration) {
          mState = 'ANIMATING'; stateTimer = now;
          startAnimHeading = currentHeading; window.glitchTarget = undefined;
        }
      } else if (mState === 'ANIMATING') {
        isOverridingHeading = true;
        const progress = Math.min((now - stateTimer) / mConf.animTime, 1);
        currentHeading = startAnimHeading + (window.finalTargetHeading - startAnimHeading) * easeInOutCubic(progress);
        if (progress >= 1) { mState = 'SHAKING'; stateTimer = now; }
      } else if (mState === 'SHAKING') {
        isOverridingHeading = true;
        shakeOffset = Math.sin(now / 15) * 1.5;
        currentHeading = window.finalTargetHeading + shakeOffset;
        if (now - stateTimer > mConf.shakeTime) {
          mState = 'RETURNING'; stateTimer = now; startAnimHeading = currentHeading - shakeOffset;
        }
      } else if (mState === 'RETURNING') {
        isOverridingHeading = true;
        const progress = Math.min((now - stateTimer) / (mConf.animTime * 1.5), 1);
        let diff = targetHeading - startAnimHeading;
        while (diff < -180) diff += 360;
        while (diff >  180) diff -= 360;
        currentHeading = startAnimHeading + diff * easeInOutCubic(progress);
        if (progress >= 1) { mState = 'IDLE'; isArmed = false; }
      }

      if (!isOverridingHeading) {
        let dh = targetHeading - currentHeading;
        while (dh < -180) dh += 360;
        while (dh >  180) dh -= 360;
        currentHeading += dh * HEADING_SMOOTHING;
      }

      currentTiltX += (targetTiltX - currentTiltX) * TILT_SMOOTHING;
      currentTiltY += (targetTiltY - currentTiltY) * TILT_SMOOTHING;

      dial.style.transform = `rotate(${-currentHeading}deg)`;
      levelBubble.style.transform = `translate(calc(-50% + ${currentTiltX}px), calc(-50% + ${currentTiltY}px))`;

      labels.forEach(label => {
        const el = document.getElementById(`label-${label.deg}-${label.outer ? 'out' : 'in'}`);
        if (el) el.style.transform = `translate(-50%, -50%) rotate(${currentHeading - label.deg}deg)`;
      });

      const displayHeading = Math.round((currentHeading % 360 + 360) % 360);
      headingText.innerText = `${displayHeading}° ${getDirection(displayHeading)}`;

      requestAnimationFrame(renderLoop);
    }

    // ── GPS / SENSORS ──
    function resetWatchdog() {
      clearTimeout(watchdogTimer);
      watchdogTimer = setTimeout(() => {
        if (hasRequestedPermission && document.visibilityState === 'visible') attachOrientationListener(true);
      }, 3000);
    }

    function handleOrientation(event) {
      if (!event) return;
      resetWatchdog();
      rawBeta  = event.beta  || 0;
      rawGamma = event.gamma || 0;
      const s = 1.6, max = 60;
      let bX = -rawGamma * s, bY = rawBeta * s;
      const dist = Math.sqrt(bX*bX + bY*bY);
      if (dist > max) { bX = bX/dist*max; bY = bY/dist*max; }
      targetTiltX = bX; targetTiltY = bY;
      const heading = event.webkitCompassHeading ?? (event.alpha !== null ? 360 - event.alpha : null);
      if (heading !== null) targetHeading = heading;
    }

    function attachOrientationListener(isAutoStart = false) {
      window.removeEventListener('deviceorientation', handleOrientation);
      window.removeEventListener('deviceorientationabsolute', handleOrientation);
      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        if (!isAutoStart) {
          DeviceOrientationEvent.requestPermission()
            .then(state => {
              if (state === 'granted') {
                window.addEventListener('deviceorientation', handleOrientation);
                hasRequestedPermission = true; startEngine();
              } else {
                alert("Sensor access denied. Please refresh to try again.");
                overlay.style.display = 'flex';
              }
            }).catch(() => { overlay.style.display = 'flex'; });
        } else {
          window.addEventListener('deviceorientation', handleOrientation);
          startEngine();
        }
      } else {
        hasRequestedPermission = true;
        if ('ondeviceorientationabsolute' in window) window.addEventListener('deviceorientationabsolute', handleOrientation);
        else window.addEventListener('deviceorientation', handleOrientation);
        startEngine();
      }
    }

    function startEngine() {
      if (overlay) { overlay.style.opacity = '0'; setTimeout(() => { overlay.style.display = 'none'; }, 300); }
      if (!isRunning) { isRunning = true; requestAnimationFrame(renderLoop); }
      startGPS(); resetWatchdog();
    }

    function toDMS(coord, isLat, isFirst) {
      const abs = Math.abs(coord);
      const deg = Math.floor(abs);
      const minF = (abs - deg) * 60;
      const min  = Math.floor(minF);
      const sec  = Math.floor((minF - min) * 60);
      const dir  = isLat ? (coord >= 0 ? "N" : "S") : (coord >= 0 ? "E" : "W");
      const sym  = isFirst ? `<span id="magic-indicator">'</span>` : `'`;
      return `${deg}°${min}${sym}${sec}" ${dir}`;
    }

    function getDistance(lat1, lon1, lat2, lon2) {
      const R = 6371e3, p1 = lat1*Math.PI/180, p2 = lat2*Math.PI/180;
      const dp = (lat2-lat1)*Math.PI/180, dl = (lon2-lon1)*Math.PI/180;
      const a = Math.sin(dp/2)**2 + Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    async function fetchAltitudeFallback(lat, lon) {
      try {
        const ctrl = new AbortController();
        setTimeout(() => ctrl.abort(), 5000);
        const res = await fetch(`https://api.open-elevation.com/api/v1/lookup?locations=${lat},${lon}`, { signal: ctrl.signal });
        const data = await res.json();
        if (data?.results?.[0]) elevationText.innerText = `${Math.round(data.results[0].elevation)} m Elevation`;
      } catch(e) {}
    }

    function startGPS() {
      if (!navigator.geolocation) return;
      if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
      watchId = navigator.geolocation.watchPosition(pos => {
        const lat = pos.coords.latitude, lon = pos.coords.longitude, alt = pos.coords.altitude;
        coordsText.innerHTML = `${toDMS(lat, true, true)} ${toDMS(lon, false, false)}`;
        magicIndicatorEl = document.getElementById('magic-indicator');
        if (alt !== null && alt !== undefined && alt !== 0) {
          elevationText.innerText = `${Math.round(alt)} m Elevation`;
        } else if (!altitudeFetched) {
          altitudeFetched = true; fetchAltitudeFallback(lat, lon);
        }
        if (!lastFetchedLat || getDistance(lastFetchedLat, lastFetchedLon, lat, lon) > 50) {
          lastFetchedLat = lat; lastFetchedLon = lon;
          fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`, { headers: { 'User-Agent': 'NativeCompassClone/1.0' }})
            .then(r => r.json())
            .then(d => { if (d.address) cityText.innerText = d.address.city || d.address.town || d.address.county || "Location Found"; })
            .catch(() => {});
        }
      }, () => {}, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });
    }

    function stopSensors() {
      isRunning = false;
      window.removeEventListener('deviceorientationabsolute', handleOrientation);
      window.removeEventListener('deviceorientation', handleOrientation);
      clearTimeout(watchdogTimer);
      if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
    }

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === 'visible' && hasRequestedPermission) attachOrientationListener(true);
      else stopSensors();
    });

    window.startAppManual = function() { attachOrientationListener(false); };

    drawTicks();
    initLabels();
  </script>

</body>
</html>
